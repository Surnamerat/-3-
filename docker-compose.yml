services:
  mysql:
    image: mysql:8.0
    container_name: autosalon-mysql
    restart: always
    environment:
      MYSQL_DATABASE: autosalon_service_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: autosalon_user
      MYSQL_PASSWORD: autosalon_pass
    ports:
      - "3307:3306"
    volumes:
      - autosalon_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app:
    build: .
    container_name: autosalon-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/autosalon_service_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: autosalon_user
      SPRING_DATASOURCE_PASSWORD: autosalon_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080

volumes:
  autosalon_mysql_data: